syntax = "proto3";

package service_discovery.v1;

import "google/protobuf/empty.proto";

service NimbusCoreServiceDiscoveryService {
  rpc PostStats(stream PostStatsRequest) returns (PostStatsResponse);
}

message PostStatsRequest {
  string address = 1;
}

message PostStatsResponse {
  google.protobuf.Empty empty = 1;
}
